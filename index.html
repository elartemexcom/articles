<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Drive Library</title>

  <style>
    :root{
      --bg:#0b0c10;
      --panel:#12141b;
      --ink:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.62);
      --line:rgba(255,255,255,.10);
      --accent:#7aa7ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header{
      padding: 18px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(122,167,255,.10), transparent);
    }
    h1{margin:0 0 6px 0; font-size:18px; letter-spacing:.2px}
    .sub{color:var(--muted); font-size:13px; line-height:1.35}
    .wrap{max-width:1100px; margin:0 auto; padding: 14px 12px 32px}
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin: 12px 4px 14px;
    }
    input[type="search"]{
      flex:1 1 260px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--ink);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }
    button{
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--ink);
      border-radius: 10px;
      padding: 10px 12px;
      cursor:pointer;
    }
    button:hover{border-color: rgba(122,167,255,.45)}
    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
    }
    .card{
      grid-column: span 12;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow:hidden;
    }
    details{width:100%}
    summary{
      list-style:none;
      cursor:pointer;
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border-bottom: 1px solid var(--line);
      user-select:none;
    }
    summary::-webkit-details-marker{display:none}
    .left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .pill{
      font-size:12px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      flex: 0 0 auto;
    }
    .title{
      font-weight:650;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 72vw;
    }
    .chev{
      color: var(--muted);
      flex: 0 0 auto;
      font-size: 12px;
    }
    details[open] .chev{color: var(--accent)}
    .content{
      padding: 12px 14px 14px;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom: 10px;
    }
    a.link{
      display:inline-block;
      text-decoration:none;
      color: var(--ink);
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      padding: 9px 10px;
      border-radius: 10px;
    }
    a.link:hover{border-color: rgba(122,167,255,.45)}
    iframe{
      width:100%;
      height: 72vh;
      border: 1px solid var(--line);
      border-radius: 12px;
      background:#0f1117;
    }
    .hint{
      color: var(--muted);
      font-size:12px;
      margin-top: 10px;
      line-height:1.35;
    }

    @media (min-width: 920px){
      .card{grid-column: span 12;}
      .title{max-width: 880px;}
    }
  </style>
</head>

    const listEl = document.getElementById("list");
    const qEl = document.getElementById("q");

    function driveViewUrl(item){
      if(item.type === "folder"){
        return `https://drive.google.com/drive/folders/${item.id}`;
      }
      return `https://drive.google.com/file/d/${item.id}/view`;
    }

    function drivePreviewUrl(item){
      return `https://drive.google.com/file/d/${item.id}/preview`;
    }

    function driveDownloadUrl(item){
      // Works for many public files; if Drive blocks direct download, the View link still works.
      return `https://drive.google.com/uc?export=download&id=${item.id}`;
    }

    function render(){
      const q = (qEl.value || "").trim().toLowerCase();
      listEl.innerHTML = "";

      let shown = 0;

      items.forEach((item, idx) => {
        const hay = `${item.label} ${item.id} ${item.type}`.toLowerCase();
        if(q && !hay.includes(q)) return;

        shown++;

        const card = document.createElement("div");
        card.className = "card";

        const details = document.createElement("details");
        // First 4 overall items visible/expanded by default (based on original order, not filtered)
        if(idx < 4) details.open = true;

        const summary = document.createElement("summary");

        const left = document.createElement("div");
        left.className = "left";

        const pill = document.createElement("span");
        pill.className = "pill";
        pill.textContent = item.type.toUpperCase();

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = item.label;

        left.appendChild(pill);
        left.appendChild(title);

        const chev = document.createElement("div");
        chev.className = "chev";
        chev.textContent = "Click to expand ▸";

        summary.appendChild(left);
        summary.appendChild(chev);

        details.appendChild(summary);

        const content = document.createElement("div");
        content.className = "content";

        const actions = document.createElement("div");
        actions.className = "actions";

        const aOpen = document.createElement("a");
        aOpen.className = "link";
        aOpen.href = driveViewUrl(item);
        aOpen.target = "_blank";
        aOpen.rel = "noopener noreferrer";
        aOpen.textContent = item.type === "folder" ? "Open folder" : "Open file";

        actions.appendChild(aOpen);

        if(item.type === "file"){
          const aDl = document.createElement("a");
          aDl.className = "link";
          aDl.href = driveDownloadUrl(item);
          aDl.target = "_blank";
          aDl.rel = "noopener noreferrer";
          aDl.textContent = "Download (if allowed)";
          actions.appendChild(aDl);
        }

        content.appendChild(actions);

        if(item.type === "file"){
          const iframe = document.createElement("iframe");
          iframe.loading = "lazy";
          iframe.allow = "autoplay";
          iframe.src = drivePreviewUrl(item);
          content.appendChild(iframe);

          const hint = document.createElement("div");
          hint.className = "hint";
          hint.textContent = "If the embed shows a permission error: set the file to “Anyone with the link can view” in Drive.";
          content.appendChild(hint);
        } else {
          const hint = document.createElement("div");
          hint.className = "hint";
          hint.textContent = "Folders don’t reliably embed in an iframe. Use “Open folder” to browse.";
          content.appendChild(hint);
        }

        details.appendChild(content);
        card.appendChild(details);
        listEl.appendChild(card);

        details.addEventListener("toggle", () => {
          chev.textContent = details.open ? "Collapse ▾" : "Click to expand ▸";
        });
        // initialize chevron state
        chev.textContent = details.open ? "Collapse ▾" : "Click to expand ▸";
      });

      if(shown === 0){
        const empty = document.createElement("div");
        empty.style.color = "rgba(255,255,255,.7)";
        empty.style.padding = "14px 6px";
        empty.textContent = "No matches. Try a different search.";
        listEl.appendChild(empty);
      }
    }

    document.getElementById("expandAll").addEventListener("click", () => {
      document.querySelectorAll("#list details").forEach(d => d.open = true);
    });

    document.getElementById("collapseAll").addEventListener("click", () => {
      document.querySelectorAll("#list details").forEach(d => d.open = false);
    });

    qEl.addEventListener("input", render);

    render();
  </script>
